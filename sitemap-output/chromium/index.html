<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRAMA - Mappe applicative chromium</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #172033;
    }
    main { width: min(1040px, 100%); }
    h1 { margin: 0 0 8px; font-size: clamp(30px, 5vw, 52px); }
    .intro { margin: 0 0 28px; color: #64748b; font-size: 17px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .card {
      min-height: 240px;
      display: flex;
      flex-direction: column;
      padding: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: white;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 8px 28px rgba(15,23,42,.07);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 14px 35px rgba(15,23,42,.12); }
    .card.parent { border-top: 6px solid #22c55e; }
    .card.partner { border-top: 6px solid #3b82f6; }
    .card.admin { border-top: 6px solid #a855f7; }
    .eyebrow { color: #64748b; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; }
    strong { display: block; margin-top: 20px; font-size: 32px; }
    small { display: block; margin-top: 7px; color: #64748b; }
    .cta { margin-top: auto; font-weight: 850; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } .card { min-height: 190px; } }
  </style>
</head>
<body>
  <main>
    <h1>TRAMA - Mappe applicative</h1>
    <p class="intro">Progetto Playwright: chromium</p>
    <section class="grid">
      <a class="card parent" href="parent/graph.html">
        <span class="eyebrow">Genitore</span>
        <strong>27 pagine</strong>
        <small>87 collegamenti · 0 errori</small>
        <span class="cta">Apri mappa →</span>
      </a>

      <a class="card partner" href="partner/graph.html">
        <span class="eyebrow">Partner / Gestori</span>
        <strong>22 pagine</strong>
        <small>248 collegamenti · 0 errori</small>
        <span class="cta">Apri mappa →</span>
      </a>

      <a class="card admin" href="admin/graph.html">
        <span class="eyebrow">Admin</span>
        <strong>18 pagine</strong>
        <small>244 collegamenti · 0 errori</small>
        <span class="cta">Apri mappa →</span>
      </a></section>
  </main>
</body>
</html>
